  if (homeFilterSmiley) homeFilterSmiley.addEventListener("change", (e) => { state.testFilters.smiley = e.target.value === "" ? null : parseInt(e.target.value, 10); render(); });
  const homeFilterDateFrom = document.getElementById("homeFilterDateFrom");
  if (homeFilterDateFrom) homeFilterDateFrom.addEventListener("change", (e) => { state.testFilters.dateFrom = e.target.value; render(); });
  const homeFilterDateTo = document.getElementById("homeFilterDateTo");
  if (homeFilterDateTo) homeFilterDateTo.addEventListener("change", (e) => { state.testFilters.dateTo = e.target.value; render(); });
  const homeFilterClearAll = document.getElementById("homeFilterClearAll");
  if (homeFilterClearAll) {
    homeFilterClearAll.addEventListener("click", () => {
      state.testFilters = { search: "", tag: null, subjectId: null, smiley: null, dateFrom: "", dateTo: "" };
      render();
    });
  }
  root.querySelectorAll('[data-action="filter-tag-chip"]').forEach((chip) => {
    chip.addEventListener("click", () => {
      state.testFilters.tag = chip.dataset.tag;
      if (state.tab !== "home") state.tab = "home";
      render();
    });
  });

  root.querySelectorAll('[data-action="toggle-visible"]').forEach((el) => {
    el.addEventListener("click", () => {
      const id = el.dataset.id;
      if (state.visibleIds.has(id)) state.visibleIds.delete(id); else state.visibleIds.add(id);
      persist();
      render();
    });
  });

  const sortSelect = document.getElementById("subjectSortSelect");
  if (sortSelect) {
    sortSelect.addEventListener("change", (e) => {
      state.subjectSort = e.target.value;
      persist();
      render();
    });
  }
  const sortDirBtn = document.getElementById("subjectSortDirBtn");
  if (sortDirBtn) {
    sortDirBtn.addEventListener("click", () => {
      state.subjectSortDir = state.subjectSortDir === "asc" ? "desc" : "asc";
      persist();
      render();
    });
  }

  // manual reordering via Pointer Events (works for mouse, touch, and pen —
  // unlike the HTML5 Drag and Drop API, which most mobile browsers don't support)
  const subjectRowsList = document.getElementById("subjectRowsList");
  if (subjectRowsList && state.subjectSort === "manual") {
    let activeRow = null;
    let pointerId = null;
    let startY = 0;
    let order = [];        // array of {el, top, height} in original (pre-drag) visual order
    let startIndex = -1;
    let currentIndex = -1;

    const captureOrder = () => {
      const rowEls = Array.from(subjectRowsList.querySelectorAll(".subject-row"));
      return rowEls.map((el) => {
        const rect = el.getBoundingClientRect();
        return { el, top: rect.top, height: rect.height };
      });
    };

    const onPointerMove = (e) => {
      if (pointerId === null || e.pointerId !== pointerId) return;
      e.preventDefault();
      const deltaY = e.clientY - startY;
      activeRow.style.transform = `translateY(${deltaY}px)`;

      // the active row's current visual center, based on its ORIGINAL top + how far it's moved
      const startEntry = order[startIndex];
      const activeMid = startEntry.top + startEntry.height / 2 + deltaY;

      // find which slot that center now falls into, based on other rows' original positions
      let newIndex = startIndex;
      for (let i = 0; i < order.length; i++) {
        if (i === startIndex) continue;
        const entry = order[i];
        const mid = entry.top + entry.height / 2;
        if (i > startIndex && activeMid > mid) newIndex = Math.max(newIndex, i);
        if (i < startIndex && activeMid < mid) newIndex = Math.min(newIndex, i);
      }
      // clamp newIndex to be monotonic relative to direction of travel from startIndex
      if (deltaY >= 0) newIndex = Math.max(startIndex, newIndex);
      else newIndex = Math.min(startIndex, newIndex);

      if (newIndex !== currentIndex) {
        // shift every row between currentIndex and newIndex out of the way visually
        const lo = Math.min(currentIndex, newIndex);
        const hi = Math.max(currentIndex, newIndex);
        for (let i = lo; i <= hi; i++) {
          if (i === startIndex) continue;
          const entry = order[i];
          const shiftDir = newIndex > startIndex ? -1 : 1; // rows move up if active moves down past them, vice versa
          entry.el.classList.add("settling");
          entry.el.style.transform = `translateY(${shiftDir * (startEntry.height)}px)`;
        }
        // rows outside the new [lo,hi] range that were previously shifted should reset
        order.forEach((entry, i) => {
          if (i !== startIndex && (i < lo || i > hi)) {
            entry.el.style.transform = "";
            entry.el.classList.remove("settling");
          }
        });
        currentIndex = newIndex;
      }
    };

    const onPointerUp = (e) => {
      if (pointerId === null || e.pointerId !== pointerId) return;
      activeRow.classList.remove("dragging");
      activeRow.style.transform = "";
      activeRow.style.zIndex = "";
      order.forEach((entry) => { entry.el.style.transform = ""; entry.el.classList.remove("settling"); });

      if (currentIndex !== startIndex) {
        const movedId = activeRow.dataset.subjectId;
        const fromIdx = state.subjects.findIndex((s) => s.id === movedId);
        if (fromIdx !== -1) {
          const [moved] = state.subjects.splice(fromIdx, 1);
          // map currentIndex (a slot among the originally-rendered rows) to a target subject id
          const referenceEntry = order[currentIndex];
          const targetId = referenceEntry ? referenceEntry.el.dataset.subjectId : null;
          let toIdx = targetId ? state.subjects.findIndex((s) => s.id === targetId) : state.subjects.length;
          if (toIdx === -1) toIdx = state.subjects.length;
          // if moving downward, the target row will shift up by one once removed, so insert AFTER it
          if (currentIndex > startIndex) toIdx += 1;
          state.subjects.splice(toIdx, 0, moved);
        }
        persist();
      }
      render();

      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
      window.removeEventListener("pointercancel", onPointerUp);
      pointerId = null;
      activeRow = null;
    };

    subjectRowsList.querySelectorAll('[data-action="drag-handle"]').forEach((handle) => {
      handle.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        activeRow = handle.closest(".subject-row");
        if (!activeRow) return;
        pointerId = e.pointerId;
        startY = e.clientY;
        order = captureOrder();
        startIndex = order.findIndex((entry) => entry.el === activeRow);
        currentIndex = startIndex;
        activeRow.classList.add("dragging");
        activeRow.style.zIndex = "10";

        try { handle.setPointerCapture(e.pointerId); } catch (err) { /* ignore */ }
        window.addEventListener("pointermove", onPointerMove, { passive: false });
        window.addEventListener("pointerup", onPointerUp);
        window.addEventListener("pointercancel", onPointerUp);
      });
    });
  }

  root.querySelectorAll('[data-action="open-quick-log"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const subjectId = btn.dataset.subject;
      const entryId = btn.dataset.entry;
      const subject = state.subjects.find((s) => s.id === subjectId);
      const entry = subject && subject.entries.find((e) => e.id === entryId);
      if (!subject || !entry) return;
      const row = root.querySelector(`[data-upcoming-row="${entryId}"]`);
      if (!row) return;
      // close any other open quick-log forms first
      root.querySelectorAll(".quick-log-form").forEach((f) => f.remove());
      row.insertAdjacentHTML("beforeend", renderQuickLogForm(subject, entry));
      const form = row.querySelector(".quick-log-form");
      const valueInput = form.querySelector(".quick-log-value");
      valueInput.focus();

      let quickSmiley = null;
      form.querySelectorAll(".smiley-btn").forEach((sBtn) => {
        sBtn.addEventListener("click", () => {
          const idx = parseInt(sBtn.dataset.smiley, 10);
          quickSmiley = quickSmiley === idx ? null : idx;
          form.querySelectorAll(".smiley-btn").forEach((b) => b.classList.toggle("smiley-selected", parseInt(b.dataset.smiley, 10) === quickSmiley));
        });
      });

      form.querySelector('[data-action="cancel-quick-log"]').addEventListener("click", () => form.remove());

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const rawValue = valueInput.value;
        const parsed = parseGradeInput(rawValue);
        const sc = scaleDef();
        const msgEl = form.querySelector(".quick-log-msg");

        if (parsed === null) {
          msgEl.innerHTML = `<div class="form-error">${icon("alert", 13)} ${escapeHtml(state.scale === 'finnish' ? t('ui.cannotReadGrade') : t('ui.enterNumericGrade'))}</div>`;
          return;
        }
        if (parsed < sc.min || parsed > sc.max) {
          msgEl.innerHTML = `<div class="form-error">${icon("alert", 13)} ${escapeHtml(t('ui.gradeRangeError', { min: sc.min, max: sc.max }))}</div>`;
          return;
        }

        entry.value = parsed;
        entry.upcoming = false;
        entry.smiley = quickSmiley;
        persist();
        render();
        showToast(`${icon("check", 14)} ${escapeHtml(t('ui.addedEntryToast', { value: formatGrade(parsed), subject: subject.name }))}`);
      });
    });
  });

  root.querySelectorAll('[data-action="convert-upcoming"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const subjectId = btn.dataset.subject;
      const entryId = btn.dataset.entry;
      const subject = state.subjects.find((s) => s.id === subjectId);
      const entry = subject.entries.find((e) => e.id === entryId);
      if (!entry) return;
      // pre-fill the Log a grade form with this entry's subject/date/label and switch focus there
      const subjSel = document.getElementById("entrySubject");
      if (subjSel) subjSel.value = subjectId;
      const dateInput = document.getElementById("entryDate");
      if (dateInput) dateInput.value = entry.date;
      const labelInput = document.getElementById("entryLabel");
      if (labelInput) labelInput.value = entry.label || "";
      const valueInput = document.getElementById("entryValue");
      if (valueInput) valueInput.focus();
      // remove the upcoming placeholder; the new graded entry will be added on submit
      subject.entries = subject.entries.filter((e) => e.id !== entryId);
      persist();
      document.querySelector(".panel")?.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });

  const avgToggle = document.getElementById("toggleAverages");
  if (avgToggle) avgToggle.addEventListener("change", (e) => { state.showAverages = e.target.checked; persist(); renderCharts(); });
  const goalToggle = document.getElementById("toggleGoals");
  if (goalToggle) goalToggle.addEventListener("change", (e) => { state.showGoals = e.target.checked; persist(); renderCharts(); });
  const trendToggle = document.getElementById("toggleTrend");
  if (trendToggle) trendToggle.addEventListener("change", (e) => { state.showTrend = e.target.checked; persist(); renderCharts(); });
  const overallToggle = document.getElementById("toggleOverallAverage");
  if (overallToggle) overallToggle.addEventListener("change", (e) => { state.showOverallAverage = e.target.checked; persist(); render(); });

  const sAvg = document.getElementById("settingsToggleAverages");
  if (sAvg) sAvg.addEventListener("change", (e) => { state.showAverages = e.target.checked; persist(); });
  const sGoals = document.getElementById("settingsToggleGoals");
  if (sGoals) sGoals.addEventListener("change", (e) => { state.showGoals = e.target.checked; persist(); });
  const sOverall = document.getElementById("settingsToggleOverallAverage");
  if (sOverall) sOverall.addEventListener("change", (e) => { state.showOverallAverage = e.target.checked; persist(); });
  const sTrend = document.getElementById("settingsToggleTrend");
  if (sTrend) sTrend.addEventListener("change", (e) => { state.showTrend = e.target.checked; persist(); });

  const scaleToggle = document.getElementById("scaleToggle");
  if (scaleToggle) {
    scaleToggle.querySelectorAll("button").forEach((btn) => {
      btn.addEventListener("click", () => {
        const newScale = btn.dataset.scale;
        if (newScale === state.scale) return;
        confirmModal({
          title: t('ui.switchScaleTitle'),
          body: t('ui.switchScaleBody'),
          confirmLabel: t('ui.switchScaleConfirm'),
          onConfirm: () => { state.scale = newScale; persist(); render(); },
        });
      });
    });
  }

  const exportJsonBtn = document.getElementById("exportJsonBtn");
  if (exportJsonBtn) exportJsonBtn.addEventListener("click", exportJson);
  const exportCsvBtn = document.getElementById("exportCsvBtn");
  if (exportCsvBtn) exportCsvBtn.addEventListener("click", exportCsv);
  const importBtn = document.getElementById("importBtn");
  const importFile = document.getElementById("importFile");
  if (importBtn && importFile) {
    importBtn.addEventListener("click", () => importFile.click());
    importFile.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) importJsonFile(file);
      importFile.value = "";
    });
  }

  const resetBtn = document.getElementById("resetAllBtn");
  if (resetBtn) {
    resetBtn.addEventListener("click", () => {
      confirmModal({
        title: t('ui.clearPromptTitle'),
        body: t('ui.clearPromptBody'),
        confirmLabel: t('ui.clearConfirm'),
        danger: true,
        onConfirm: () => {
          state.subjects = [];
          state.visibleIds = new Set();
          persist();
          render();
          showToast(escapeHtml(t('ui.clearedToast')));
        },
      });
    });
  }

  const addEntryForm = document.getElementById("addEntryForm");
  if (addEntryForm) {
    let entryType = TYPES.TEST;
    let selectedSmiley = null;
    const seg = document.getElementById("entryTypeSeg");
    const tagsField = document.getElementById("entryTagsField");
    seg.querySelectorAll("button").forEach((btn) => {
      btn.addEventListener("click", () => {
        entryType = btn.dataset.type;
        seg.querySelectorAll("button").forEach((b) => b.classList.toggle("segmented-active", b === btn));
        if (tagsField) tagsField.style.display = entryType === TYPES.TEST ? "" : "none";
      });
    });

    const smileyPicker = document.getElementById("smileyPicker");
    if (smileyPicker) {
      smileyPicker.querySelectorAll(".smiley-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = parseInt(btn.dataset.smiley, 10);
          selectedSmiley = selectedSmiley === idx ? null : idx;
          smileyPicker.querySelectorAll(".smiley-btn").forEach((b) => b.classList.toggle("smiley-selected", parseInt(b.dataset.smiley, 10) === selectedSmiley));
        });
      });
    }

    addEntryForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const subjectId = document.getElementById("entrySubject").value;
      const date = document.getElementById("entryDate").value;
      const rawValue = document.getElementById("entryValue").value;
      const label = document.getElementById("entryLabel").value.trim();
      const note = document.getElementById("entryNote").value.trim();
      const tagsInput = document.getElementById("entryTags");
      const tags = entryType === TYPES.TEST && tagsInput ? parseTags(tagsInput.value) : [];
      const msgEl = document.getElementById("entryFormMsg");

      const parsed = parseGradeInput(rawValue);
      const sc = scaleDef();

      if (parsed === null) {
        msgEl.innerHTML = `<div class="form-error">${icon("alert", 13)} ${escapeHtml(state.scale === 'finnish' ? t('ui.cannotReadGrade') : t('ui.enterNumericGrade'))}</div>`;
        return;
      }
      if (parsed < sc.min || parsed > sc.max) {
        msgEl.innerHTML = `<div class="form-error">${icon("alert", 13)} ${escapeHtml(t('ui.gradeRangeError', { min: sc.min, max: sc.max }))}</div>`;
        return;
      }
      if (!subjectId) {
        msgEl.innerHTML = `<div class="form-error">${icon("alert", 13)} ${escapeHtml(t('ui.addSubjectFirst'))}</div>`;
        return;
      }
      if (!date) {
        msgEl.innerHTML = `<div class="form-error">${icon("alert", 13)} ${escapeHtml(t('ui.pickDate'))}</div>`;
        return;
      }

      const subject = state.subjects.find((s) => s.id === subjectId);
      subject.entries.push({ id: uid(), date, value: parsed, type: entryType, label, note, smiley: selectedSmiley, upcoming: false, tags });
      persist();

      msgEl.innerHTML = `<div class="form-success">${icon("check", 13)} ${escapeHtml(t('ui.addedEntrySuccessForm', { value: formatGrade(parsed), subject: subject.name }))}</div>`;
      document.getElementById("entryValue").value = "";
      document.getElementById("entryLabel").value = "";
      document.getElementById("entryNote").value = "";
      render();
    });
  }

  const addUpcomingForm = document.getElementById("addUpcomingForm");
  if (addUpcomingForm) {
    addUpcomingForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const subjectId = document.getElementById("upcomingSubject").value;
      const date = document.getElementById("upcomingDate").value;
      const label = document.getElementById("upcomingLabel").value.trim();
      const tagsInput = document.getElementById("upcomingTags");
      const tags = tagsInput ? parseTags(tagsInput.value) : [];
      if (!subjectId || !date) return;
      const subject = state.subjects.find((s) => s.id === subjectId);
      subject.entries.push({ id: uid(), date, value: null, type: TYPES.TEST, label, note: "", smiley: null, upcoming: true, tags });
      persist();
      render();
      showToast(`${icon("check", 14)} ${escapeHtml(t('ui.addedUpcomingToast', { label: label || t('ui.entryTypeUpcoming'), subject: subject.name }))}`);
    });
  }

  const addSubjectForm = document.getElementById("addSubjectForm");
  if (addSubjectForm) {
    addSubjectForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const input = document.getElementById("newSubjectName");
      const name = input.value.trim();
      if (!name) return;
      const s = { id: uid(), name, color: nextColor(), goal: null, groupId: null, entries: [] };
      state.subjects.push(s);
      state.visibleIds.add(s.id);
      persist();
      render();
      showToast(`${icon("check", 14)} ${escapeHtml(t('ui.addedSubjectToast', { name }))}`);
    });
  }

  const addGroupForm = document.getElementById("addGroupForm");
  if (addGroupForm) {
    addGroupForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const input = document.getElementById("newGroupName");
      const name = input.value.trim();
      if (!name) return;
      const g = { id: uid(), name, color: nextGroupColor() };
      state.groups.push(g);
      persist();
      render();
      showToast(`${icon("check", 14)} ${escapeHtml(t('ui.addedSubjectToast', { name }))}`);
    });
  }

  root.querySelectorAll('[data-action="rename-group"]').forEach((input) => {
    input.addEventListener("change", () => {
      const g = groupById(input.dataset.id);
      const val = input.value.trim();
      if (!g) return;
      if (val) { g.name = val; persist(); render(); }
      else input.value = g.name;
    });
  });

  root.querySelectorAll('[data-action="set-group-parent"]').forEach((select) => {
    select.addEventListener("change", () => {
      const g = groupById(select.dataset.id);
      if (!g) return;
      const newParentId = select.value || null;
      // defense-in-depth: reject if this would create a cycle, even though the dropdown
      // already excludes invalid options under normal rendering
      if (newParentId === g.id || (newParentId && isDescendantOf(newParentId, g.id))) {
        select.value = g.parentId || "";
        showToast(`${icon("alert", 14)} ${escapeHtml(t('ui.cannotNestCycle'))}`);
        return;
      }
      g.parentId = newParentId;
      persist();
      render();
    });
  });

  root.querySelectorAll('[data-action="open-group-color"]').forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const existing = btn.parentElement.querySelector(".color-picker");
      if (existing) { existing.remove(); return; }
      document.querySelectorAll(".color-picker, .group-select-menu").forEach((p) => p.remove());
      const g = groupById(btn.dataset.id);
      if (!g) return;
      const picker = document.createElement("div");
      picker.className = "color-picker";
      picker.innerHTML = `
        <div class="color-grid">
          ${COLOR_SWATCHES.map((c) => `<button type="button" class="color-swatch ${c === g.color ? 'color-swatch-active' : ''}" style="background:${c}" data-color="${c}"></button>`).join("")}
        </div>
        <label class="color-custom"><span>Custom</span><input type="color" value="${g.color}" /></label>
      `;
      btn.parentElement.appendChild(picker);
      picker.querySelectorAll(".color-swatch").forEach((sw) => {
        sw.addEventListener("click", () => { g.color = sw.dataset.color; persist(); render(); });
      });
      picker.querySelector('input[type="color"]').addEventListener("input", (ev) => { g.color = ev.target.value; persist(); render(); });
      const closeHandler = (ev) => {
        if (!picker.contains(ev.target) && ev.target !== btn) {
          picker.remove();
          document.removeEventListener("click", closeHandler);
        }
      };
      setTimeout(() => document.addEventListener("click", closeHandler), 0);
    });
  });

  root.querySelectorAll('[data-action="delete-group"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const g = groupById(btn.dataset.id);
      if (!g) return;
      const childCount = childGroups(g.id).length;
      confirmModal({
        title: t('ui.groupDeleteConfirmTitle'),
        body: childCount ? t('ui.groupDeleteConfirmBodyWithChildren', { count: childCount }) : t('ui.groupDeleteConfirmBody'),
        confirmLabel: t('ui.deleteConfirm'),
        danger: true,
        onConfirm: () => {
          // promote direct subjects and child groups up to the deleted group's own parent
          // (deleting a folder moves its contents up one level, rather than scattering to root)
          state.subjects.forEach((s) => { if (s.groupId === g.id) s.groupId = g.parentId || null; });
          state.groups.forEach((other) => { if (other.parentId === g.id) other.parentId = g.parentId || null; });
          state.groups = state.groups.filter((x) => x.id !== g.id);
          persist();
          render();
        },
      });
    });
  });

  root.querySelectorAll('[data-action="rename"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const subject = state.subjects.find((s) => s.id === id);
      const wrap = document.createElement("div");
      wrap.className = "subject-name-editing-wrap";
      wrap.innerHTML = `<span class="name-dash">—</span><input type="text" class="subject-name-input-dashed" /><span class="name-dash">—</span>`;
      const input = wrap.querySelector("input");
      input.value = subject.name;
      btn.replaceWith(wrap);
      input.focus();
      input.select();
      const commit = () => {
        const val = input.value.trim();
        if (val) { subject.name = val; persist(); }
        render();
      };
      input.addEventListener("blur", commit);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") commit();
        if (e.key === "Escape") render();
      });
    });
  });

  root.querySelectorAll('[data-action="set-goal"]').forEach((input) => {
    input.addEventListener("change", () => {
      const id = input.dataset.id;
      const subject = state.subjects.find((s) => s.id === id);
      const raw = input.value.trim();
      if (!raw) { subject.goal = null; persist(); render(); return; }
      const parsed = parseGradeInput(raw);
      if (parsed === null) { input.value = subject.goal !== null && subject.goal !== undefined ? formatGrade(subject.goal) : ""; return; }
      subject.goal = clampToScale(parsed);
      persist();
      render();
    });
  });

  root.querySelectorAll('[data-action="clear-goal"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const subject = state.subjects.find((s) => s.id === id);
      subject.goal = null;
      persist();
      render();
    });
  });

  root.querySelectorAll('[data-action="open-group-menu"]').forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const existing = btn.parentElement.querySelector(".group-select-menu");
      if (existing) { existing.remove(); return; }
      document.querySelectorAll(".group-select-menu, .color-picker").forEach((p) => p.remove());
      const id = btn.dataset.id;
      const subject = state.subjects.find((s) => s.id === id);
      const menu = document.createElement("div");
      menu.className = "group-select-menu";
      const renderMenuOptions = () => `
        <button type="button" class="group-select-option ${!subject.groupId ? 'selected' : ''}" data-group-id="">
          ${icon("x", 13)} ${escapeHtml(t('ui.noGroup'))}
        </button>
        ${state.groups.length ? `<div class="group-select-divider"></div>` : ""}
        ${state.groups.map((g) => `
          <button type="button" class="group-select-option ${subject.groupId === g.id ? 'selected' : ''}" data-group-id="${g.id}">
            <span class="subject-dot-sm" style="background:${g.color}"></span> ${escapeHtml(g.name)}
          </button>
        `).join("")}
        <div class="group-select-divider"></div>
        <div class="group-select-new">
          <input type="text" placeholder="${escapeHtml(t('ui.newGroupPlaceholder'))}" />
          <button type="button" class="btn-secondary" style="padding:5px 9px;">${icon("plus", 13)}</button>
        </div>
      `;
      menu.innerHTML = renderMenuOptions();
      btn.parentElement.appendChild(menu);

      const wireOptions = () => {
        menu.querySelectorAll(".group-select-option").forEach((opt) => {
          opt.addEventListener("click", () => {
            subject.groupId = opt.dataset.groupId || null;
            persist();
            render();
          });
        });
        const newInput = menu.querySelector(".group-select-new input");
        const newBtn = menu.querySelector(".group-select-new button");
        const createGroup = () => {
          const name = newInput.value.trim();
          if (!name) return;
          const g = { id: uid(), name, color: nextGroupColor() };
          state.groups.push(g);
          subject.groupId = g.id;
          persist();
          render();
        };
        newBtn.addEventListener("click", createGroup);
        newInput.addEventListener("keydown", (ev) => { if (ev.key === "Enter") { ev.preventDefault(); createGroup(); } });
      };
      wireOptions();

      const closeHandler = (ev) => {
        if (!menu.contains(ev.target) && ev.target !== btn) {
          menu.remove();
          document.removeEventListener("click", closeHandler);
        }
      };
      setTimeout(() => document.addEventListener("click", closeHandler), 0);
    });
  });

  root.querySelectorAll('[data-action="open-color"]').forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const existing = btn.parentElement.querySelector(".color-picker");
      if (existing) { existing.remove(); return; }
      document.querySelectorAll(".color-picker").forEach((p) => p.remove());
      const id = btn.dataset.id;
      const subject = state.subjects.find((s) => s.id === id);
      const picker = document.createElement("div");
      picker.className = "color-picker";
      picker.innerHTML = `
        <div class="color-grid">
          ${COLOR_SWATCHES.map((c) => `<button type="button" class="color-swatch ${c === subject.color ? 'color-swatch-active' : ''}" style="background:${c}" data-color="${c}"></button>`).join("")}
        </div>
        <label class="color-custom"><span>Custom</span><input type="color" value="${subject.color}" /></label>
      `;
      btn.parentElement.appendChild(picker);
      picker.querySelectorAll(".color-swatch").forEach((sw) => {
        sw.addEventListener("click", () => {
          subject.color = sw.dataset.color;
          persist();
          render();
        });
      });
      picker.querySelector('input[type="color"]').addEventListener("input", (ev) => {
        subject.color = ev.target.value;
        persist();
        render();
      });
      const closeHandler = (ev) => {
        if (!picker.contains(ev.target) && ev.target !== btn) {
          picker.remove();
          document.removeEventListener("click", closeHandler);
        }
      };
      setTimeout(() => document.addEventListener("click", closeHandler), 0);
    });
  });

  root.querySelectorAll('[data-action="delete-subject"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const subject = state.subjects.find((s) => s.id === id);
      confirmModal({
        title: t('ui.deleteSubjectTitle', { name: subject.name }),
        body: t('ui.deleteSubjectBody', { count: subject.entries.length }),
        confirmLabel: t('ui.deleteConfirm'),
        danger: true,
        onConfirm: () => {
          state.subjects = state.subjects.filter((s) => s.id !== id);
          state.visibleIds.delete(id);
          persist();
          render();
          showToast(`${icon("check", 14)} ${escapeHtml(t('ui.deletedToast', { name: subject.name }))}`);
        },
      });
    });
  });

  root.querySelectorAll('[data-action="toggle-detail"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const body = btn.parentElement.querySelector(".subject-detail-body");
      const chevron = btn.querySelector(".detail-chevron");
      const isOpen = body.style.display !== "none";
      body.style.display = isOpen ? "none" : "block";
      chevron.innerHTML = isOpen ? icon("chevronRight", 16) : icon("chevronDown", 16);
    });
  });

  root.querySelectorAll('[data-action="filter"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const filter = btn.dataset.filter;
      const subject = state.subjects.find((s) => s.id === id);
      const container = btn.closest(".subject-detail");
      container.querySelectorAll('[data-action="filter"]').forEach((b) => b.classList.toggle("active", b === btn));
      container.querySelector(".entry-list-wrap").innerHTML = renderEntryList(subject, filter);
      attachEntryDeleteHandlers(container);
    });
  });

  attachEntryDeleteHandlers(root);
}

function attachEntryDeleteHandlers(scope) {
  scope.querySelectorAll('[data-action="delete-entry"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const subjectId = btn.dataset.subject;
      const entryId = btn.dataset.entry;
      const subject = state.subjects.find((s) => s.id === subjectId);
      subject.entries = subject.entries.filter((e) => e.id !== entryId);
      persist();
      render();
    });
  });
}

/* ======================================================================
   INIT
====================================================================== */
async function init() {
  try {
    const langSelect = document.getElementById("langSelect");
    langSelect.value = state.lang || 'en';
    langSelect.addEventListener("change", (e) => {
      state.lang = e.target.value;
      try { localStorage.setItem(STORAGE_KEY + ':lang', state.lang); } catch (e) {}
      localizeDom(document);
      render();
    });

    document.querySelectorAll('[data-icon]').forEach((el) => {
      const name = el.dataset.icon;
      el.innerHTML = icon(name, 15);
    });
    localizeDom(document);

    document.getElementById("storageWarning").style.display = state.hasStorage ? "none" : "flex";
    document.getElementById("storageWarningText").textContent = state.hasStorage ? "" : t('storage.warning');
    document.getElementById("footerText").textContent = state.hasStorage
      ? t('storage.footerSaved')
      : t('storage.footerNotSaving');

    const data = await loadState();
    if (data && Array.isArray(data.subjects) && data.subjects.length) {
      state.subjects = data.subjects.map((s) => ({
        id: s.id || uid(),
        name: s.name,
        color: s.color,
        goal: s.goal ?? null,
        groupId: s.groupId ?? null,
        entries: (s.entries || []).map((e) => ({ note: "", smiley: null, upcoming: false, tags: [], ...e })),
      }));
      state.groups = Array.isArray(data.groups) ? data.groups.map((g) => ({ parentId: null, ...g })) : [];
      state.scale = data.scale && SCALES[data.scale] ? data.scale : state.scale;
      state.showAverages = data.showAverages !== undefined ? data.showAverages : state.showAverages;
      state.showGoals = data.showGoals !== undefined ? data.showGoals : state.showGoals;
      state.showTrend = !!data.showTrend;
      state.showOverallAverage = data.showOverallAverage !== undefined ? data.showOverallAverage : state.showOverallAverage;
      state.subjectSort = data.subjectSort || "manual";
      state.subjectSortDir = data.subjectSortDir || "asc";
      state.visibleIds = data.visibleIds && data.visibleIds.length ? new Set(data.visibleIds) : new Set(state.subjects.map((s) => s.id));
      state.collapsedGroupIds = Array.isArray(data.collapsedGroupIds) ? new Set(data.collapsedGroupIds) : new Set();
    } else {
      state.subjects = makeDefaultSubjects(state.scale);
      state.groups = makeDefaultGroups();
      state.visibleIds = new Set(state.subjects.map((s) => s.id));
    }
    state.loaded = true;

    try { render(); } catch (err) { window.__gt_showError && window.__gt_showError(err.message || String(err), err && err.stack); }
  } catch (errInit) {
    window.__gt_showError && window.__gt_showError(errInit.message || String(errInit), errInit && errInit.stack);
  }
}

init();
</script>
</body>
</html>
