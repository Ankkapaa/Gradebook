<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Gradebook</title>
<style>
/* ======================================================================
   DESIGN TOKENS
====================================================================== */
:root {
  --paper: #FAF6EE;
  --paper-raised: #FFFFFF;
  --ink: #1B2A41;
  --ink-soft: #44546B;
  --ink-faint: #8C95A6;
  --rule: #E8E1D2;
  --rule-strong: #D8CFB8;
  --red: #C1432B;
  --red-soft: #C1432B1A;
  --sage: #5C7A5C;
  --sage-soft: #5C7A5C1A;
  --gold: #A8763E;
  --gold-soft: #A8763E1A;
  --font-display: 'Source Serif 4', Georgia, 'Times New Roman', serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--paper);
  background-image: repeating-linear-gradient(transparent, transparent 27px, var(--rule) 27px, var(--rule) 28px);
  min-height: 100vh;
  font-family: var(--font-body);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; }

/* ---------- Header ---------- */
.gt-header {
  background: var(--paper-raised);
  border-bottom: 2px solid var(--ink);
  position: sticky;
  top: 0;
  z-index: 30;
}
.gt-header-inner {
  max-width: 1040px;
  margin: 0 auto;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.gt-brand { display: flex; align-items: baseline; gap: 10px; }
.gt-brand-mark { font-family: var(--font-display); font-size: 30px; color: var(--red); line-height: 1; }
.gt-brand h1 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
.gt-brand p { margin: 0; font-size: 12px; color: var(--ink-faint); font-style: italic; font-family: var(--font-display); }

.gt-tabs { display: flex; gap: 4px; background: var(--paper); border: 1.5px solid var(--rule-strong); border-radius: 8px; padding: 3px; }
.gt-tabs button {
  display: flex; align-items: center; gap: 6px; border: none; background: transparent;
  padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;
  color: var(--ink-soft); cursor: pointer; font-family: var(--font-body);
  transition: background 0.15s, color 0.15s;
}
.gt-tabs button.active { background: var(--ink); color: var(--paper); }
.gt-tabs button:hover:not(.active) { background: var(--rule); }

.storage-warning {
  max-width: 1040px; margin: 10px auto 0; padding: 0 18px;
  display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--red);
}

/* ---------- Main ---------- */
.gt-main { max-width: 1040px; margin: 0 auto; padding: 22px 18px 70px; display: flex; flex-direction: column; gap: 22px; }

.panel { background: var(--paper-raised); border: 1.5px solid var(--rule-strong); border-radius: 12px; padding: 18px 20px; }
.panel-title {
  font-family: var(--font-display); font-size: 17px; font-weight: 600; margin: 0 0 14px;
  padding-bottom: 10px; border-bottom: 1.5px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.panel-title-sub { font-size: 11.5px; font-weight: 500; color: var(--ink-faint); font-family: var(--font-body); }

/* ---------- Summary strip ---------- */
.summary-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr)); gap: 10px; }
.summary-card {
  background: var(--paper-raised); border: 1.5px solid var(--rule-strong); border-left: 4px solid var(--accent, var(--ink));
  border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
}
.summary-card-top { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.03em; }
.summary-card-mid { display: flex; align-items: baseline; gap: 8px; }
.summary-card-avg { font-family: var(--font-mono); font-size: 26px; font-weight: 700; line-height: 1; }
.summary-card-goal { font-size: 11px; color: var(--ink-faint); font-family: var(--font-mono); }

.letter-grade { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--ink-soft); background: var(--rule); padding: 2px 6px; border-radius: 5px; }

.growth-badge { display: inline-flex; align-items: center; gap: 3px; font-family: var(--font-mono); font-weight: 600; padding: 2px 7px; border-radius: 5px; white-space: nowrap; font-size: 13px; }
.growth-badge svg { width: 13px; height: 13px; }
.growth-up { color: var(--sage); background: var(--sage-soft); }
.growth-down { color: var(--red); background: var(--red-soft); }
.growth-flat { color: var(--ink-faint); background: var(--rule); }

/* ---------- Chart controls ---------- */
.chart-controls { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.visibility-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  display: flex; align-items: center; gap: 6px; border: 1.5px solid var(--chip-color); background: var(--paper-raised);
  border-radius: 999px; padding: 5px 12px 5px 8px; font-size: 12.5px; font-weight: 600; cursor: pointer;
  font-family: var(--font-body); transition: opacity 0.15s, background 0.15s;
}
.chip-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--chip-color); }
.chip-on { color: var(--ink); background: color-mix(in srgb, var(--chip-color) 12%, var(--paper-raised)); }
.chip-off { opacity: 0.4; }
.chip-off .chip-dot { background: var(--ink-faint); }

.toggle-group { display: flex; gap: 14px; flex-wrap: wrap; }
.gt-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-soft); cursor: pointer; user-select: none; }
.gt-toggle input { accent-color: var(--red); width: 15px; height: 15px; }

/* ---------- Chart panel ---------- */
.chart-panel { background: var(--paper-raised); border: 1.5px solid var(--rule-strong); border-radius: 12px; padding: 18px 14px 14px; }
.chart-panel-header { display: flex; align-items: center; gap: 8px; padding: 0 4px 12px; color: var(--ink); }
.chart-panel-header h3 { font-family: var(--font-display); font-size: 16px; font-weight: 600; margin: 0; }
.chart-canvas-wrap { position: relative; height: 320px; }
.empty-chart { padding: 40px 20px; text-align: center; color: var(--ink-faint); font-size: 13.5px; font-style: italic; font-family: var(--font-display); }

/* ---------- Forms ---------- */
.add-entry-form { display: flex; flex-direction: column; gap: 12px; }
.add-entry-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field-wide { grid-column: 1 / -1; }
.field span { font-size: 11.5px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field select, .field textarea {
  border: 1.5px solid var(--rule-strong); background: var(--paper); border-radius: 8px; padding: 9px 10px;
  font-size: 14px; font-family: var(--font-body); color: var(--ink); width: 100%;
}
.field textarea { resize: vertical; min-height: 56px; font-family: var(--font-body); }
.field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--red); outline-offset: 1px; }
.field-hint { font-size: 11px; color: var(--ink-faint); font-style: italic; }

.segmented { display: flex; border: 1.5px solid var(--rule-strong); border-radius: 8px; overflow: hidden; }
.segmented button { flex: 1; border: none; background: var(--paper); padding: 9px 8px; font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer; font-family: var(--font-body); }
.segmented-active { background: var(--ink) !important; color: var(--paper) !important; }

.form-error { display: flex; align-items: center; gap: 6px; color: var(--red); font-size: 12.5px; font-weight: 600; }
.form-success { display: flex; align-items: center; gap: 6px; color: var(--sage); font-size: 12.5px; font-weight: 600; }

.btn-primary, .btn-secondary, .btn-ghost {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px; border-radius: 8px;
  font-weight: 700; font-size: 13.5px; cursor: pointer; font-family: var(--font-body); border: none;
  padding: 10px 16px; transition: transform 0.1s, opacity 0.15s;
}
.btn-primary { background: var(--ink); color: var(--paper); align-self: flex-start; }
.btn-primary:hover { opacity: 0.88; }
.btn-secondary { background: var(--paper); color: var(--ink); border: 1.5px solid var(--rule-strong); white-space: nowrap; }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary:not(:disabled):hover { border-color: var(--ink); }
.btn-ghost { background: transparent; color: var(--ink-soft); border: 1.5px solid transparent; padding: 7px 11px; font-size: 12.5px; }
.btn-ghost:hover { background: var(--rule); }
.btn-danger-outline { background: var(--paper); color: var(--red); border: 1.5px solid var(--red); }
.btn-danger-outline:hover { background: var(--red-soft); }

/* ---------- Subject rows ---------- */
.subject-rows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.subject-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; border: 1.5px solid var(--rule); flex-wrap: wrap; }
.subject-visibility { border: none; background: transparent; cursor: pointer; padding: 4px; flex-shrink: 0; }
.subject-dot, .subject-dot-sm { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.subject-dot-sm { width: 9px; height: 9px; }
.subject-visibility-off { opacity: 0.5; }
.subject-name { background: transparent; border: none; font-size: 14.5px; font-weight: 600; cursor: pointer; text-align: left; font-family: var(--font-body); color: var(--ink); flex: 1; padding: 4px; min-width: 80px; }
.subject-name-input { flex: 1; border: 1.5px solid var(--red); border-radius: 6px; padding: 4px 8px; font-size: 14.5px; font-family: var(--font-body); min-width: 80px; }
.subject-row-growth { flex-shrink: 0; }
.subject-row-actions { display: flex; gap: 2px; flex-shrink: 0; }
.icon-btn { border: none; background: transparent; padding: 6px; border-radius: 6px; cursor: pointer; color: var(--ink-soft); display: flex; align-items: center; }
.icon-btn:hover { background: var(--rule); }
.icon-btn-danger:hover { background: var(--red-soft); color: var(--red); }
.icon-btn svg { width: 15px; height: 15px; }

.subject-goal-input { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-faint); background: var(--paper); border: 1px solid var(--rule-strong); border-radius: 7px; padding: 4px 8px 4px 6px; }
.subject-goal-input .goal-label { font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; font-size: 10px; color: var(--ink-faint); white-space: nowrap; }
.subject-goal-input input { width: 56px; border: none; padding: 2px 2px; font-family: var(--font-mono); font-size: 12.5px; background: transparent; color: var(--ink); font-weight: 700; }
.subject-goal-input input:focus { outline: none; }
.subject-goal-input.has-goal { border-color: var(--gold); background: var(--gold-soft); }
.subject-goal-input.has-goal .goal-label, .subject-goal-input.has-goal input { color: var(--gold); }
.goal-clear-btn { border: none; background: transparent; cursor: pointer; color: var(--ink-faint); padding: 0; display: flex; }
.goal-clear-btn:hover { color: var(--red); }

/* Dashed-name rename treatment */
.subject-name-dashed {
  background: transparent; border: none; font-size: 14.5px; font-weight: 600; cursor: pointer; text-align: left;
  font-family: var(--font-body); color: var(--ink); flex: 1; padding: 4px 2px; min-width: 80px;
  border-bottom: 1.5px dashed var(--rule-strong); border-radius: 0;
  transition: border-color 0.15s, color 0.15s;
}
.subject-name-dashed:hover { border-color: var(--red); color: var(--red); }
.subject-name-editing-wrap { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 80px; }
.subject-name-editing-wrap .name-dash { color: var(--ink-faint); font-family: var(--font-mono); font-weight: 400; }
.subject-name-input-dashed {
  flex: 1; border: none; border-bottom: 1.5px dashed var(--red); border-radius: 0; padding: 4px 2px;
  font-size: 14.5px; font-weight: 600; font-family: var(--font-body); min-width: 60px; background: transparent; color: var(--ink);
}
.subject-name-input-dashed:focus { outline: none; }

/* Sort controls */
.subject-list-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.sort-control { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-faint); }
.sort-control select { border: 1.5px solid var(--rule-strong); border-radius: 7px; padding: 5px 8px; font-size: 12.5px; font-family: var(--font-body); background: var(--paper-raised); color: var(--ink); }
.sort-direction-btn { border: 1.5px solid var(--rule-strong); background: var(--paper-raised); border-radius: 7px; padding: 5px 7px; cursor: pointer; color: var(--ink-soft); display: flex; }
.sort-direction-btn:hover { border-color: var(--ink); }
.drag-handle { cursor: grab; color: var(--ink-faint); padding: 4px 2px; flex-shrink: 0; touch-action: none; }
.drag-handle:active { cursor: grabbing; }
.subject-row.dragging { opacity: 0.85; box-shadow: 0 6px 16px rgba(27,42,65,0.18); cursor: grabbing; position: relative; }
.subject-row.settling { transition: transform 0.15s ease; }

/* All-subjects aggregate card */
.aggregate-card {
  background: var(--paper-raised); border: 1.5px solid var(--ink); border-left: 4px solid var(--ink);
  border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
  grid-column: 1 / -1;
}
.aggregate-card .summary-card-top { color: var(--ink); }
.aggregate-card .summary-card-avg { color: var(--ink); }

/* Self-assessment smileys */
.smiley-picker { display: flex; gap: 6px; }
.smiley-btn { border: 1.5px solid var(--rule-strong); background: var(--paper); border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, border-color 0.15s; padding: 0; line-height: 1; }
.smiley-btn:hover { transform: scale(1.1); }
.smiley-btn.smiley-selected { border-color: var(--ink); border-width: 2px; background: var(--paper-raised); box-shadow: 0 2px 6px rgba(27,42,65,0.15); }
.entry-smiley { font-size: 14px; margin-left: 2px; }

/* Upcoming test badge */
.upcoming-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; padding: 2px 7px; border-radius: 4px; background: var(--gold-soft); color: var(--gold); }
.upcoming-list { display: flex; flex-direction: column; gap: 6px; }
.upcoming-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1.5px dashed var(--rule-strong); border-radius: 8px; font-size: 13px; flex-wrap: wrap; }
.upcoming-row-date { font-family: var(--font-mono); font-weight: 700; color: var(--gold); min-width: 56px; }
.upcoming-row-subject { display: flex; align-items: center; gap: 6px; font-weight: 600; flex: 1; min-width: 90px; }
.upcoming-row-label { color: var(--ink-faint); font-size: 12px; flex: 1; min-width: 80px; }
.countdown-chip { font-family: var(--font-mono); font-size: 11px; background: var(--rule); padding: 2px 7px; border-radius: 999px; color: var(--ink-soft); white-space: nowrap; }
.tag-chip-row { display: flex; gap: 5px; flex-wrap: wrap; }
.tag-chip { display: inline-flex; align-items: center; gap: 3px; font-family: var(--font-mono); font-size: 10.5px; background: var(--gold-soft); color: var(--gold); padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
.tag-chip[data-action="filter-tag-chip"] { cursor: pointer; border: 1px solid transparent; }
.tag-chip[data-action="filter-tag-chip"]:hover { border-color: var(--gold); }

/* Group dropdown + badges */
.group-select-anchor { position: relative; flex-shrink: 0; }
.group-select-btn {
  display: inline-flex; align-items: center; gap: 5px; border: 1.5px solid var(--rule-strong); background: var(--paper);
  border-radius: 7px; padding: 5px 8px; font-size: 11.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer;
  font-family: var(--font-body); white-space: nowrap; max-width: 120px;
}
.group-select-btn .group-select-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }
.group-select-btn:hover { border-color: var(--ink); }
.group-select-menu {
  position: absolute; top: calc(100% + 6px); left: 0; background: var(--paper-raised); border: 1.5px solid var(--rule-strong);
  border-radius: 10px; padding: 6px; box-shadow: 0 8px 24px rgba(27,42,65,0.18); z-index: 40; min-width: 170px;
  display: flex; flex-direction: column; gap: 2px;
}
.group-select-option {
  display: flex; align-items: center; gap: 8px; border: none; background: transparent; border-radius: 7px;
  padding: 7px 9px; font-size: 13px; cursor: pointer; text-align: left; font-family: var(--font-body); color: var(--ink);
}
.group-select-option:hover { background: var(--rule); }
.group-select-option.selected { background: var(--gold-soft); color: var(--gold); font-weight: 700; }
.group-select-divider { height: 1px; background: var(--rule); margin: 4px 2px; }
.group-select-new { display: flex; gap: 6px; padding: 6px 4px 2px; }
.group-select-new input { flex: 1; border: 1.5px solid var(--rule-strong); border-radius: 6px; padding: 5px 7px; font-size: 12.5px; background: var(--paper); }
.group-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
.group-section { margin-bottom: 18px; }
.group-section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1.5px dashed var(--rule-strong); }
.group-section-title { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.03em; flex: 1; }
.group-manage-row { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border: 1.5px solid var(--rule); border-radius: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.group-nest-indicator { color: var(--ink-faint); flex-shrink: 0; display: flex; }
.group-parent-select {
  border: 1.5px solid var(--rule-strong); border-radius: 6px; padding: 4px 7px; font-size: 11.5px; background: var(--paper);
  color: var(--ink-soft); font-family: var(--font-body); cursor: pointer; max-width: 130px;
}
.group-manage-row input { flex: 1; border: none; background: transparent; font-size: 13.5px; font-weight: 600; font-family: var(--font-body); color: var(--ink); }
.group-manage-row input:focus { outline: none; border-bottom: 1.5px dashed var(--red); }
.group-manage-count { font-size: 11px; color: var(--ink-faint); font-family: var(--font-mono); white-space: nowrap; }

/* Dashboard group sections (collapsible, unlimited nesting) */
.group-sections { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.group-section {
  border: 1.5px solid var(--rule-strong); border-radius: 12px; background: var(--paper-raised);
  margin-left: calc(var(--depth, 0) * 16px);
}
.group-section-header {
  width: 100%; display: flex; align-items: center; gap: 8px; background: transparent; border: none; cursor: pointer;
  padding: 12px 14px; font-family: var(--font-body); text-align: left; flex-wrap: wrap;
}
.group-collapse-chevron { color: var(--ink-faint); flex-shrink: 0; display: flex; }
.group-section-title { font-weight: 700; font-size: 14px; flex-shrink: 0; }
.group-section-count { font-size: 11px; color: var(--ink-faint); font-family: var(--font-mono); background: var(--rule); padding: 1px 7px; border-radius: 999px; }
.group-section-stats { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.group-section-body { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 10px; }
.summary-strip-nested { margin: 0; }

/* Embedded test search & filter panel (lives inside the Charts dashboard) */
.test-search-panel { padding-bottom: 14px; }
.test-search-toggle {
  width: 100%; background: transparent; border: none; cursor: pointer; display: flex; align-items: center;
  justify-content: space-between; padding: 0 0 14px; font-family: var(--font-display); font-size: 17px; font-weight: 600;
  color: var(--ink); margin: 0; border-bottom: 1.5px solid var(--rule);
}
.test-search-toggle span:first-child { display: flex; align-items: center; gap: 8px; }
.test-search-toggle .group-collapse-chevron { color: var(--ink-faint); }

.test-search-bar { display: flex; align-items: center; gap: 8px; background: var(--paper); border: 1.5px solid var(--rule-strong); border-radius: 10px; padding: 9px 12px; margin: 14px 0 12px; }
.test-search-bar svg { flex-shrink: 0; color: var(--ink-faint); }
.test-search-bar input { flex: 1; border: none; background: transparent; font-size: 14px; font-family: var(--font-body); color: var(--ink); min-width: 0; }
.test-search-bar input:focus { outline: none; }

.test-filter-bar { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 8px; margin-bottom: 16px; }
.test-filter-select {
  border: 1.5px solid var(--rule-strong); border-radius: 8px; padding: 7px 9px; font-size: 12.5px; background: var(--paper-raised);
  color: var(--ink); font-family: var(--font-body); cursor: pointer; height: 34px; box-sizing: border-box;
}
.test-filter-select.active-filter { border-color: var(--red); background: var(--red-soft); color: var(--red); font-weight: 700; }

.test-filter-date-field { display: flex; flex-direction: column; gap: 3px; }
.test-filter-date-field span { font-size: 10px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.03em; }
.test-filter-date {
  border: 1.5px solid var(--rule-strong); border-radius: 8px; padding: 6px 8px; font-size: 12.5px; background: var(--paper-raised);
  color: var(--ink); font-family: var(--font-body); cursor: pointer; height: 34px; box-sizing: border-box;
  min-width: 132px; width: auto; line-height: 1.2; -webkit-appearance: none; appearance: none;
}
.test-filter-date::-webkit-calendar-picker-indicator { opacity: 0.6; cursor: pointer; }
.test-filter-date.active-filter { border-color: var(--red); background: var(--red-soft); color: var(--red); }

.home-filter-clear-btn {
  display: inline-flex; align-items: center; gap: 5px; border: 1.5px solid var(--red); background: var(--paper-raised); color: var(--red);
  border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font-body); height: 34px; box-sizing: border-box;
}
.home-filter-clear-btn:hover { background: var(--red-soft); }

.home-results-count { font-size: 12px; color: var(--ink-faint); margin-bottom: 10px; font-family: var(--font-mono); }

.home-test-list { display: flex; flex-direction: column; gap: 8px; }
.home-test-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1.5px solid var(--rule); border-radius: 10px;
  background: var(--paper-raised); flex-wrap: wrap;
}
.home-test-row.is-upcoming { border-style: dashed; border-color: var(--gold); }
.home-test-row-date { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--ink-soft); min-width: 56px; }
.home-test-row-subject { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 13.5px; min-width: 90px; }
.home-test-row-label { color: var(--ink-soft); font-size: 13px; flex: 1; min-width: 100px; }
.home-test-row-value { font-family: var(--font-mono); font-weight: 700; font-size: 15px; min-width: 50px; text-align: right; }
.home-test-row-meta { display: flex; align-items: center; gap: 8px; flex-basis: 100%; margin-top: 2px; }
.home-empty { text-align: center; padding: 40px 20px; color: var(--ink-faint); font-style: italic; font-family: var(--font-display); }
.log-result-btn {
  display: inline-flex; align-items: center; gap: 5px; border: 1.5px solid var(--sage); background: var(--sage-soft); color: var(--sage);
  border-radius: 7px; padding: 5px 10px; font-size: 11.5px; font-weight: 700; cursor: pointer; font-family: var(--font-body); white-space: nowrap;
}
.log-result-btn:hover { background: var(--sage); color: var(--paper-raised); }
.upcoming-row-actions { display: flex; align-items: center; gap: 4px; }
.quick-log-form {
  flex-basis: 100%; display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap;
  border-top: 1.5px dashed var(--rule-strong); margin-top: 8px; padding-top: 10px;
}
.quick-log-form .field { min-width: 100px; }
.quick-log-form .field input { padding: 7px 9px; font-size: 13px; }
.quick-log-form .smiley-picker { gap: 4px; }
.quick-log-form .smiley-btn { width: 30px; height: 30px; font-size: 15px; }
.quick-log-cancel { background: transparent; border: none; color: var(--ink-faint); font-size: 12px; cursor: pointer; padding: 7px 4px; }
.quick-log-cancel:hover { color: var(--red); }

.color-picker-anchor { position: relative; }
.color-picker {
  position: absolute; top: calc(100% + 6px); right: 0; background: var(--paper-raised); border: 1.5px solid var(--rule-strong);
  border-radius: 10px; padding: 12px; box-shadow: 0 8px 24px rgba(27,42,65,0.18); z-index: 40; width: 168px;
}
.color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
.color-swatch { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
.color-swatch-active { border-color: var(--ink); transform: scale(1.1); }
.color-custom { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--ink-soft); border-top: 1px solid var(--rule); padding-top: 8px; }
.color-custom input { width: 32px; height: 24px; border: none; padding: 0; cursor: pointer; }

.add-subject-form { display: flex; align-items: center; gap: 8px; border-top: 1.5px solid var(--rule); padding-top: 14px; flex-wrap: wrap; }
.add-subject-form input { flex: 1; min-width: 140px; border: 1.5px solid var(--rule-strong); border-radius: 8px; padding: 9px 10px; font-size: 14px; font-family: var(--font-body); background: var(--paper); }
.add-subject-form input:focus { outline: 2px solid var(--red); outline-offset: 1px; }

/* ---------- Subject details / entry list ---------- */
.subject-details { display: flex; flex-direction: column; gap: 8px; }
.subject-detail { border: 1.5px solid var(--rule); border-radius: 8px; overflow: hidden; }
.subject-detail-toggle { width: 100%; display: flex; align-items: center; gap: 8px; background: var(--paper); border: none; padding: 10px 12px; cursor: pointer; font-family: var(--font-body); color: var(--ink-soft); flex-wrap: wrap; }
.subject-detail-name { font-weight: 700; color: var(--ink); flex: 1; text-align: left; min-width: 90px; }
.subject-detail-stats { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.subject-detail-avg { font-family: var(--font-mono); font-size: 12px; color: var(--ink-faint); }
.subject-detail-body { padding: 10px 14px 14px; border-top: 1px solid var(--rule); }

.entry-filter { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.entry-filter button { border: 1.5px solid var(--rule-strong); background: var(--paper-raised); border-radius: 999px; padding: 4px 11px; font-size: 11.5px; font-weight: 600; cursor: pointer; color: var(--ink-soft); font-family: var(--font-body); }
.entry-filter button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

.entry-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
.entry-row { display: grid; grid-template-columns: 56px 56px 1fr 44px 24px; align-items: center; gap: 8px; padding: 7px 4px; border-bottom: 1px solid var(--rule); font-size: 12.5px; }
.entry-row:last-child { border-bottom: none; }
.entry-row-note { grid-column: 1 / -1; font-size: 11.5px; color: var(--ink-faint); font-style: italic; padding: 0 4px 6px 4px; border-bottom: 1px solid var(--rule); }
.entry-date { font-family: var(--font-mono); color: var(--ink-faint); }
.entry-type { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; text-align: center; }
.entry-type-test { background: var(--sage-soft); color: var(--sage); }
.entry-type-report { background: var(--red-soft); color: var(--red); }
.entry-label { color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-value { font-family: var(--font-mono); font-weight: 700; text-align: right; }

.empty-state-mini { color: var(--ink-faint); font-size: 13px; font-style: italic; font-family: var(--font-display); }

/* ---------- Settings panel ---------- */
.settings-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--rule); flex-wrap: wrap; }
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-size: 14px; font-weight: 600; }
.settings-row-desc { font-size: 12px; color: var(--ink-faint); margin-top: 2px; max-width: 420px; }
.scale-toggle { display: flex; border: 1.5px solid var(--rule-strong); border-radius: 8px; overflow: hidden; }
.scale-toggle button { border: none; background: var(--paper); padding: 8px 14px; font-size: 13px; font-weight: 700; color: var(--ink-soft); cursor: pointer; font-family: var(--font-mono); }
.scale-toggle button.active { background: var(--ink); color: var(--paper); }

.import-export-row { display: flex; gap: 10px; flex-wrap: wrap; }
input[type="file"] { display: none; }

.scale-reference { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.scale-chip { font-family: var(--font-mono); font-size: 11px; background: var(--rule); padding: 3px 8px; border-radius: 5px; color: var(--ink-soft); }

/* ---------- Footer ---------- */
.gt-footer { text-align: center; padding: 16px; font-size: 11.5px; color: var(--ink-faint); font-family: var(--font-mono); }

/* ---------- Toast ---------- */
.gt-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--paper); padding: 10px 18px; border-radius: 8px; font-size: 13px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25); z-index: 100; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none;
  display: flex; align-items: center; gap: 8px;
}
.gt-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ---------- Modal (confirm dialogs) ---------- */
.gt-modal-backdrop { position: fixed; inset: 0; background: rgba(27,42,65,0.4); display: flex; align-items: center; justify-content: center; z-index: 90; padding: 20px; }
.gt-modal { background: var(--paper-raised); border-radius: 12px; padding: 20px; max-width: 360px; width: 100%; box-shadow: 0 16px 40px rgba(0,0,0,0.25); }
.gt-modal h4 { margin: 0 0 8px; font-family: var(--font-display); font-size: 17px; }
.gt-modal p { margin: 0 0 16px; font-size: 13.5px; color: var(--ink-soft); }
.gt-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ---------- Icons (inline SVG via mask, simple line icons) ---------- */
svg { display: block; }

/* ---------- Mobile ---------- */
@media (max-width: 640px) {
  .gt-header-inner { padding: 12px 14px; }
  .gt-brand h1 { font-size: 19px; }
  .gt-brand p { display: none; }
  .gt-main { padding: 16px 12px 60px; gap: 16px; }
  .panel { padding: 14px; }
  .add-entry-grid { grid-template-columns: 1fr 1fr; }
  .entry-row { grid-template-columns: 48px 48px 1fr 38px 22px; font-size: 11.5px; }
  .summary-strip { grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); }
  .gt-tabs button span.label { display: none; }
  .chart-panel { padding: 14px 8px 10px; }
  .settings-row { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 400px) {
  .add-entry-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="gt-header">
  <div class="gt-header-inner">
    <div class="gt-brand">
      <span class="gt-brand-mark">&sect;</span>
      <div>
        <h1 data-i18n="brand.title">Gradebook</h1>
        <p data-i18n="brand.subtitle">your grades, charted like a ticker</p>
      </div>
    </div>
    <nav class="gt-tabs" id="tabNav">
      <button data-tab="charts" class="active" data-tab-icon="grid" data-i18n-key="tabs.charts"><span class="tab-icon" data-icon="grid"></span><span class="label"></span></button>
      <button data-tab="manage" data-tab-icon="pencil" data-i18n-key="tabs.manage"><span class="tab-icon" data-icon="pencil"></span><span class="label"></span></button>
      <button data-tab="settings" data-tab-icon="settings" data-i18n-key="tabs.settings"><span class="tab-icon" data-icon="settings"></span><span class="label"></span></button>
    </nav>
    <div style="display:flex; gap:8px; align-items:center;">
      <select id="langSelect" style="border:1px solid var(--rule-strong); padding:6px; border-radius:6px; font-family:var(--font-body);">
        <option value="en">English</option>
        <option value="fi">Suomi</option>
      </select>
    </div>
  </div>
</header>

<div id="storageWarning" class="storage-warning" style="display:none;">
  <span class="storage-icon" data-icon="alert"></span>
  <span id="storageWarningText"></span>
</div>

<main class="gt-main" id="mainRoot"></main>

<footer class="gt-footer" id="footerText">Saved automatically on this device.</footer>

<div id="toast" class="gt-toast"></div>
<div id="modalRoot"></div>

function t(key, vars) {
  const lang = state.lang || 'en';
  const parts = key.split(".");
  let cur = TRANSLATIONS[lang] || TRANSLATIONS.en;
  for (const p of parts) {
    cur = cur && cur[p];
    if (cur === undefined) break;
  }
  let str = cur !== undefined ? String(cur) : key;
  if (vars) {
    Object.keys(vars).forEach(k => {
      str = str.replace(new RegExp(`\\{${k}\\}`, "g"), String(vars[k]));
    });
  }
  return str;
}

// tags are entered as a comma-separated string and stored as a normalized lowercase array
function parseTags(raw) {
  if (!raw) return [];
  return Array.from(new Set(
    raw.split(",")
      .map((t) => t.trim().toLowerCase())
      .filter(Boolean)
  )).slice(0, 8); // cap to keep chips manageable
}

function allTagsInUse() {
  const set = new Set();
  state.subjects.forEach((s) => s.entries.forEach((e) => (e.tags || []).forEach((tg) => set.add(tg))));
  return Array.from(set).sort();
}

function groupById(id) {
  return state.groups.find((g) => g.id === id) || null;
}

function groupNameFor(subject) {
  const g = subject.groupId ? groupById(subject.groupId) : null;
  return g ? g.name : "";
}

function nextGroupColor() {
  const used = state.groups.map((g) => g.color);
  return COLOR_SWATCHES.find((c) => !used.includes(c)) || COLOR_SWATCHES[used.length % COLOR_SWATCHES.length];
}

// direct child groups of a given group (or root-level groups if groupId is null)
function childGroups(parentId) {
  return state.groups.filter((g) => (g.parentId || null) === (parentId || null));
}

// subjects directly assigned to a group (not including subjects in child groups)
function directSubjectsOf(groupId) {
  return state.subjects.filter((s) => (s.groupId || null) === (groupId || null));
}

// true if `candidateAncestorId` appears anywhere up the parent chain of `groupId` —
// used to prevent creating a cycle when a group is moved under another group
function isDescendantOf(groupId, candidateAncestorId) {
  let current = groupById(groupId);
  const seen = new Set();
  while (current && current.parentId) {
    if (seen.has(current.id)) return false; // already-corrupt cycle guard
    seen.add(current.id);
    if (current.parentId === candidateAncestorId) return true;
    current = groupById(current.parentId);
  }
  return false;
}

// every subject under a group, including subjects nested inside descendant subgroups
function allSubjectsUnder(groupId) {
  const direct = directSubjectsOf(groupId);
  const subGroups = childGroups(groupId);
  return subGroups.reduce((acc, sg) => acc.concat(allSubjectsUnder(sg.id)), direct);
}

// average of all subject-averages under a group (recursively), mirroring overallAverage()
function groupAverage(groupId) {
  const subjects = allSubjectsUnder(groupId);
  const avgs = subjects.map((s) => average(graded(s.entries))).filter((v) => v !== null);
  if (!avgs.length) return null;
  return avgs.reduce((sum, v) => sum + v, 0) / avgs.length;
}

function groupGoalAverage(groupId) {
  const subjects = allSubjectsUnder(groupId);
  const goals = subjects.map((s) => s.goal).filter((v) => v !== null && v !== undefined);
  if (!goals.length) return null;
  return goals.reduce((sum, v) => sum + v, 0) / goals.length;
}

// flattens every TEST-type entry (graded or upcoming) across all subjects, for the dashboard test list
function allTestEntries() {
  const list = [];
  state.subjects.forEach((s) => {
    s.entries.filter((e) => e.type === TYPES.TEST).forEach((e) => {
      list.push({ ...e, subjectId: s.id, subjectName: s.name, subjectColor: s.color, groupId: s.groupId });
    });
  });
  return list;
}

function applyHomeFilters(entries) {
  const f = state.testFilters;
  return entries.filter((e) => {
    if (f.search) {
      const q = f.search.toLowerCase();
      const haystack = `${e.subjectName} ${e.label || ""}`.toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    if (f.subjectId && e.subjectId !== f.subjectId) return false;
    if (f.tag && !(e.tags || []).includes(f.tag)) return false;
    if (f.smiley !== null && f.smiley !== undefined) {
      if (e.upcoming) return false;
      if (e.smiley !== f.smiley) return false;
    }
    if (f.dateFrom && e.date < f.dateFrom) return false;
    if (f.dateTo && e.date > f.dateTo) return false;
    return true;
  });
}

/* ======================================================================
   FINNISH GRADE PARSING
====================================================================== */
function parseFinnishGrade(raw) {
  if (raw === null || raw === undefined) return null;
  let s = String(raw).trim();
  if (!s) return null;
  s = s.replace(",", ".");           
  s = s.replace(/\s+/g, "");          
  let raw2 = String(raw).trim().replace(",", ".");
  let m;
  if ((m = raw2.match(/^(\d{1,2})\s*1\/2$/))) {
    return parseFloat(m[1]) + 0.5;
  }
  if (/^\d{1,2}(\.\d{1,2})?$/.test(s)) {
    return parseFloat(s);
  }
  if ((m = s.match(/^(\d{1,2})½$/))) {
    return parseFloat(m[1]) + 0.5;
  }
  if ((m = s.match(/^(\d{1,2})\+$/))) {
    return parseFloat(m[1]) + 0.25;
  }
  if ((m = s.match(/^(\d{1,2})[-–]$/))) {
    return parseFloat(m[1]) - 0.25;
  }
  return null;
}

function formatFinnishGrade(value) {
  if (value === null || value === undefined || Number.isNaN(value)) return "—";
  if (Math.abs(value - 10.25) < 0.001) return "10+";
  const whole = Math.floor(value);
  const frac = Math.round((value - whole) * 100) / 100;
  if (frac === 0) return String(whole);
  if (Math.abs(frac - 0.25) < 0.001) return `${whole}+`;
  if (Math.abs(frac - 0.5) < 0.001) return `${whole}½`;
  if (Math.abs(frac - 0.75) < 0.001) return `${whole + 1}-`;
  return value.toFixed(2).replace(/\.?0+$/, "");
}

function finnishDescriptor(value) {
  if (value === null || value === undefined || Number.isNaN(value)) return "";
  const r = Math.round(value);
  const key = `descriptors.finnish.${r}`;
  const localized = t(key);
  // fallback to English descriptor if localization missing
  if (localized === key) {
    const enDesc = (TRANSLATIONS.en && TRANSLATIONS.en.descriptors && TRANSLATIONS.en.descriptors.finnish && TRANSLATIONS.en.descriptors.finnish[String(r)]) || "";
    return enDesc || "";
  }
  return localized;
}

    if (!state.hasStorage) return null;
    if (window.storage) {
      const res = await window.storage.get(STORAGE_KEY, false);
      if (!res || !res.value) return null;
      return JSON.parse(res.value);
    } else {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    }
  } catch (e) { return null; }
}
let saveTimer = null;
function persist() {
  if (!state.hasStorage) return;
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const payload = JSON.stringify({
      subjects: state.subjects,
      groups: state.groups,
      showAverages: state.showAverages,
      showGoals: state.showGoals,
      showTrend: state.showTrend,
      showOverallAverage: state.showOverallAverage,
      scale: state.scale,
      visibleIds: Array.from(state.visibleIds),
      subjectSort: state.subjectSort,
      subjectSortDir: state.subjectSortDir,
      collapsedGroupIds: Array.from(state.collapsedGroupIds),
    });
    try {
      if (window.storage) {
        await window.storage.set(STORAGE_KEY, payload, false);
      } else {
        localStorage.setItem(STORAGE_KEY, payload);
      }
      try { localStorage.setItem(STORAGE_KEY + ':lang', state.lang); } catch (e) {}
    } catch (e) { /* ignore */ }
  }, 350);
}

/* ======================================================================
   GRADE HELPERS
====================================================================== */
function scaleDef() { return SCALES[state.scale]; }

function clampToScale(n) {
  const sc = scaleDef();
  return Math.max(sc.min, Math.min(sc.max, n));
}

function parseGradeInput(raw) {
  if (state.scale === "finnish") return parseFinnishGrade(raw);
  const n = parseFloat(String(raw).replace(",", "."));
  return Number.isNaN(n) ? null : n;
}

function formatGrade(value) {
  if (value === null || value === undefined) return "—";
  if (state.scale === "finnish") return formatFinnishGrade(value);
  return Number.isInteger(value) ? String(value) : value.toFixed(1);
}

function letterOrDescriptor(value) {
  if (value === null || value === undefined) return "";
  if (state.scale === "finnish") return finnishDescriptor(value);
  let letter = "F";
  if (value >= 97) letter = "A+"; else if (value >= 93) letter = "A"; else if (value >= 90) letter = "A-";
  else if (value >= 87) letter = "B+"; else if (value >= 83) letter = "B"; else if (value >= 80) letter = "B-";
  else if (value >= 77) letter = "C+"; else if (value >= 73) letter = "C"; else if (value >= 70) letter = "C-";
  else if (value >= 67) letter = "D+"; else if (value >= 63) letter = "D"; else if (value >= 60) letter = "D-";
  return letter;
}

function average(entries) {
  if (!entries.length) return null;
  return entries.reduce((s, e) => s + e.value, 0) / entries.length;
}

function getGrowth(entries) {
  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  if (sorted.length < 2) return { delta: null, pct: null, direction: "flat" };
  const last = sorted[sorted.length - 1].value;
  const prev = sorted[sorted.length - 2].value;
  const delta = last - prev;
  const pct = prev !== 0 ? (delta / prev) * 100 : 0;
  const direction = delta > 0.001 ? "up" : delta < -0.001 ? "down" : "flat";
  return { delta, pct, direction };
}

// graded() filters out upcoming/scheduled entries that don't have a real grade yet
function graded(entries) {
  return entries.filter((e) => !e.upcoming && e.value !== null && e.value !== undefined);
}

function sortedSubjects() {
  const list = [...state.subjects];
  if (state.subjectSort === "manual") return list;
  const dir = state.subjectSortDir === "desc" ? -1 : 1;
  if (state.subjectSort === "name") {
    list.sort((a, b) => a.name.localeCompare(b.name) * dir);
  } else if (state.subjectSort === "average") {
    list.sort((a, b) => {
      const avgA = average(graded(a.entries));
      const avgB = average(graded(b.entries));
      if (avgA === null && avgB === null) return 0;
      if (avgA === null) return 1;
      if (avgB === null) return -1;
      return (avgA - avgB) * dir;
    });
  } else if (state.subjectSort === "growth") {
    list.sort((a, b) => {
      const gA = getGrowth(graded(a.entries)).delta;
      const gB = getGrowth(graded(b.entries)).delta;
      if (gA === null && gB === null) return 0;
      if (gA === null) return 1;
      if (gB === null) return -1;
      return (gA - gB) * dir;
    });
  }
  return list;
}

function overallAverage() {
  const avgs = state.subjects.map((s) => average(graded(s.entries))).filter((v) => v !== null);
  if (!avgs.length) return null;
  return avgs.reduce((sum, v) => sum + v, 0) / avgs.length;
}

function overallGoal() {
  const goals = state.subjects.map((s) => s.goal).filter((v) => v !== null && v !== undefined);
  if (!goals.length) return null;
  return goals.reduce((sum, v) => sum + v, 0) / goals.length;
}

function upcomingEntriesAll() {
  const list = [];
  state.subjects.forEach((s) => {
    s.entries.filter((e) => e.upcoming).forEach((e) => list.push({ ...e, subjectId: s.id, subjectName: s.name, subjectColor: s.color }));
  });
  return list.sort((a, b) => a.date.localeCompare(b.date));
}

function daysUntil(dateStr) {
  const today = new Date(todayISO() + "T00:00:00");
  const target = new Date(dateStr + "T00:00:00");
  return Math.round((target - today) / 86400000);
}

function linearRegression(points) {
  const n = points.length;
  if (n < 2) return null;
  let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
  points.forEach((p) => { sumX += p.x; sumY += p.y; sumXY += p.x * p.y; sumXX += p.x * p.x; });
  const denom = n * sumXX - sumX * sumX;
  if (denom === 0) return null;
  const slope = (n * sumXY - sumX * sumY) / denom;
  const intercept = (sumY - slope * sumX) / n;
  return { slope, intercept };
}

function growthBadgeHtml(entries, size) {
  const { delta, pct, direction } = getGrowth(entries);
  const fontSize = size === "sm" ? 11 : 13;
  if (delta === null) return `<span class="growth-badge growth-flat" style="font-size:${fontSize}px">—</span>`;
  const iconName = direction === "up" ? "up" : direction === "down" ? "down" : "flat";
  const cls = direction === "up" ? "growth-up" : direction === "down" ? "growth-down" : "growth-flat";
  const sign = delta > 0 ? "+" : "";
  const deltaStr = state.scale === "finnish" ? delta.toFixed(2).replace(/0$/, "").replace(/\.$/, "") : delta.toFixed(1);
  return `<span class="growth-badge ${cls}" style="font-size:${fontSize}px">${icon(iconName, size === "sm" ? 12 : 14)}${sign}${deltaStr} (${sign}${pct.toFixed(1)}%)</span>`;
}

/* Add a visible error overlay and global handlers so runtime errors are shown */
(function attachGlobalErrorHandlers() {
  const overlay = document.createElement("div");
  overlay.id = "gt-error-overlay";
  overlay.style = "position:fixed;inset:12px;z-index:9999;padding:18px;background:#111;color:#fff;border-radius:8px;overflow:auto;display:none;font-family:monospace;font-size:13px;line-height:1.3;white-space:pre-wrap;";
  document.addEventListener("DOMContentLoaded", () => document.body.appendChild(overlay));
  function showErr(msg, stack) {
    const body = `${msg}${stack ? "\n\n" + stack : ""}`;
    overlay.textContent = "JavaScript error — check console\n\n" + body;
    overlay.style.display = "block";
    console.error("GT ERROR:", msg, stack);
  }
  window.__gt_showError = showErr;
  window.addEventListener("error", (ev) => { try { ev.preventDefault(); showErr(ev.message || String(ev), ev.error && ev.error.stack); } catch(e) {/*ignore*/} });
  window.addEventListener("unhandledrejection", (ev) => { try { ev.preventDefault(); const r = ev.reason; showErr(String(r), r && r.stack); } catch(e) {/*ignore*/} });
})();

/* renderOneChart: defensive, dynamic Chart.js loader, safe callbacks */
function renderOneChart(type) {
  try {
    const wrap = document.getElementById(`chartWrap-${type}`);
    if (!wrap) return;

    let canvas = wrap.querySelector("canvas");
    if (!canvas) {
      wrap.innerHTML = `<canvas id="chart-${type}"></canvas>`;
      canvas = document.getElementById(`chart-${type}`);
    }

    const visibleSubjects = state.subjects.filter((s) => state.visibleIds.has(s.id));
    const anyData = visibleSubjects.some((s) => buildSeries(s, type).length > 0);

    if (charts[type]) { try { charts[type].destroy(); } catch(e){}; charts[type] = null; }

    if (!anyData) {
      wrap.innerHTML = `<div class="empty-chart">${escapeHtml(t('ui.noEntriesForVisible', { type: t(type === 'test' ? 'ui.testsQuizzes' : 'ui.reportCard') }))}</div>`;
      return;
    }

    const ctx = canvas.getContext && canvas.getContext("2d");
    if (!ctx) {
      console.error("Canvas 2D context unavailable", { type, ctx });
      return;
    }

    // dynamic loader for Chart.js (tries several CDNs)
    if (typeof Chart === "undefined") {
      const scriptId = "gt-chartjs";
      const CDNS = [
        "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js",
        "https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js",
      ];
      if (!document.querySelector(`[data-gt-loader="${scriptId}"]`)) {
        let attempt = 0;
        const tryLoad = () => {
          if (attempt >= CDNS.length) {
            showToast(`${icon("alert",14)} Could not load Chart.js`);
            console.error("Failed to load Chart.js from CDNs:", CDNS);
            return;
          }
          const s = document.createElement("script");
          s.setAttribute("data-gt-loader", scriptId);
          s.src = CDNS[attempt++];
          s.async = true;
          s.onload = () => {
            console.log("Chart.js loaded from", s.src);
            if (typeof Chart !== "undefined") {
              try { renderOneChart(type); } catch (e) { console.error(e); }
            } else {
              tryLoad();
            }
          };
          s.onerror = () => {
            console.warn("Failed loading Chart.js from", s.src);
            s.remove();
            tryLoad();
          };
          document.head.appendChild(s);
        };
        tryLoad();
      } else {
        setTimeout(() => { try { renderOneChart(type); } catch (e) { console.error(e); } }, 400);
      }
      return;
    }

    // build unified date axis
    const dateSet = new Set();
    visibleSubjects.forEach((s) => buildSeries(s, type).forEach((e) => dateSet.add(e.date)));
    const dates = Array.from(dateSet).sort();

    const datasets = [];

    visibleSubjects.forEach((s) => {
      const series = buildSeries(s, type);
      const byDate = {};
      series.forEach((e) => { byDate[e.date] = e; });
      const dataPoints = dates.map((d) => (byDate[d] ? byDate[d].value : null));

      datasets.push({
        label: s.name,
        data: dataPoints,
        borderColor: s.color,
        backgroundColor: s.color,
        pointRadius: dataPoints.map((v) => (v === null ? 0 : 3.5)),
        pointHoverRadius: 5.5,
        borderWidth: 2.5,
        spanGaps: true,
        tension: 0.3,
        meta: dates.map((d) => byDate[d] || null),
        order: 1,
      });

      if (state.showAverages && series.length) {
        const avg = average(series);
        datasets.push({
          label: `${s.name} avg`,
          data: dates.map(() => avg),
          borderColor: s.color,
          borderDash: [5, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          spanGaps: true,
          isReference: true,
          order: 2,
        });
      }

      if (state.showGoals && s.goal !== null && s.goal !== undefined && series.length) {
        datasets.push({
          label: `${s.name} goal`,
          data: dates.map(() => s.goal),
          borderColor: s.color,
          borderDash: [2, 3],
          borderWidth: 1.25,
          pointRadius: 0,
          spanGaps: true,
          isReference: true,
          order: 3,
        });
      }

      if (state.showTrend && series.length >= 2) {
        const pts = series.map((e, i) => ({ x: i, y: e.value }));
        const reg = linearRegression(pts);
        if (reg) {
          const trendByDate = dates.map((d) => {
            const idx = series.findIndex((e) => e.date === d);
            if (idx === -1) return null;
            return reg.slope * idx + reg.intercept;
          });
          datasets.push({
            label: `${s.name} trend`,
            data: trendByDate,
            borderColor: s.color,
            borderDash: [1, 2],
            borderWidth: 1.5,
            pointRadius: 0,
            spanGaps: true,
            isReference: true,
            order: 4,
          });
        }
      }
    });

    if (state.showOverallAverage && visibleSubjects.length > 1) {
      const perSubjectAvgs = visibleSubjects
        .map((s) => average(buildSeries(s, type)))
        .filter((v) => v !== null);
      if (perSubjectAvgs.length > 1) {
        const overallAvg = perSubjectAvgs.reduce((sum, v) => sum + v, 0) / perSubjectAvgs.length;
        datasets.push({
          label: t('ui.allSubjects'),
          data: dates.map(() => overallAvg),
          borderColor: "#1B2A41",
          borderDash: [7, 3],
          borderWidth: 2,
          pointRadius: 0,
          spanGaps: true,
          isReference: true,
          order: 0,
        });
      }
    }

    const sc = scaleDef();

    // safe callbacks to avoid runtime exceptions inside Chart.js
    const safeTickCallback = function(value, index) {
      const i = (typeof index === "number") ? index : value;
      const d = (dates && dates[i]) ? dates[i] : null;
      return d ? fmtDate(d) : "";
    };
    const safeTooltipTitle = function(items) {
      if (!items || !items.length) return "";
      const idx = items[0] && typeof items[0].dataIndex === "number" ? items[0].dataIndex : null;
      const d = (idx !== null && dates && dates[idx]) ? dates[idx] : null;
      return d ? fmtDate(d) : "";
    };
    const safeTooltipLabel = function(item) {
      const meta = item && item.dataset && item.dataset.meta ? item.dataset.meta[item.dataIndex] : null;
      const y = item && item.parsed && typeof item.parsed.y !== "undefined" ? item.parsed.y : (item && typeof item.raw !== "undefined" ? item.raw : null);
      let label = item && item.dataset && item.dataset.label ? item.dataset.label : "";
      let line = `${label}: ${formatGrade(y)}`;
      if (meta && meta.label) line += ` — ${meta.label}`;
      return line;
    };
    const safeTooltipAfter = function(item) {
      const meta = item && item.dataset && item.dataset.meta ? item.dataset.meta[item.dataIndex] : null;
      return meta && meta.note ? `note: ${meta.note}` : undefined;
    };

    charts[type] = new Chart(ctx, {
      type: "line",
      data: { labels: dates, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "nearest", intersect: false },
        scales: {
          x: {
            ticks: { font: { family: "monospace", size: 11 }, color: "#8C95A6", callback: safeTickCallback },
            grid: { color: "#E8E1D2", drawTicks: false },
            border: { color: "#D8CFB8" },
          },
          y: {
            min: sc.min, max: sc.max,
            ticks: { font: { family: "monospace", size: 11 }, color: "#8C95A6" },
            grid: { color: "#E8E1D2" },
            border: { display: false },
          },
        },
        plugins: {
          legend: {
            labels: {
              filter: (item, data) => {
                const ds = data.datasets[item.datasetIndex];
                return !ds || !ds.isReference;
              },
              font: { family: "monospace", size: 12 },
              color: "#44546B",
            },
          },
          tooltip: {
            filter: (item) => !item.dataset.isReference,
            backgroundColor: "#1B2A41",
            titleFont: { family: "monospace", size: 11 },
            bodyFont: { size: 12 },
            padding: 10,
            callbacks: {
              title: safeTooltipTitle,
              label: safeTooltipLabel,
              afterLabel: safeTooltipAfter,
            },
          },
        },
      },
    });
  } catch (err) {
    window.__gt_showError && window.__gt_showError(err.message || String(err), err && err.stack);
    console.error(err);
  }
}

/* ======================================================================
   EXPORT / IMPORT
====================================================================== */
function exportJson() {
  const payload = {
    version: 3,
    exportedAt: new Date().toISOString(),
    scale: state.scale,
    subjects: state.subjects,
    groups: state.groups,
  };
  downloadFile(`gradebook-export-${todayISO()}.json`, JSON.stringify(payload, null, 2), "application/json");
  showToast(`${icon("check", 14)} ${escapeHtml(t('ui.exportSuccessJson'))}`);
}

function exportCsv() {
  const rows = [["subject", "group", "type", "date", "value", "label", "note", "smiley", "upcoming", "tags"]];
  state.subjects.forEach((s) => {
    const g = s.groupId ? groupById(s.groupId) : null;
    s.entries.forEach((e) => {
      rows.push([
        s.name,
        g ? g.name : "",
        e.type,
        e.date,
        e.upcoming ? "" : formatGrade(e.value),
        e.label || "",
        e.note || "",
        (e.smiley !== null && e.smiley !== undefined) ? e.smiley : "",
        e.upcoming ? "yes" : "no",
        (e.tags && e.tags.length) ? e.tags.join("|") : "",
      ]);
    });
  });
  const csv = rows.map((r) => r.map(csvEscape).join(",")).join("\n");
  downloadFile(`gradebook-export-${todayISO()}.csv`, csv, "text/csv");
  showToast(`${icon("check", 14)} ${escapeHtml(t('ui.exportSuccessCsv'))}`);
}

function csvEscape(v) {
  const s = String(v ?? "");
  if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function importJsonFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.subjects)) throw new Error("bad shape");
      confirmModal({
        title: t('ui.importPromptTitle'),
        body: t('ui.importPromptBody', { count: data.subjects.length }),
        confirmLabel: t('ui.importConfirm'),
        danger: true,
        onConfirm: () => {
          state.subjects = data.subjects.map((s) => ({
            id: s.id || uid(),
            name: s.name || "Untitled",
            color: s.color || nextColor(),
            goal: s.goal ?? null,
            groupId: s.groupId ?? null,
            entries: (s.entries || []).map((e) => ({
              id: e.id || uid(),
              date: e.date,
              value: e.value ?? null,
              type: e.type === TYPES.REPORT ? TYPES.REPORT : TYPES.TEST,
              label: e.label || "",
              note: e.note || "",
              smiley: (e.smiley !== undefined && e.smiley !== null) ? e.smiley : null,
              upcoming: !!e.upcoming,
              tags: Array.isArray(e.tags) ? e.tags : [],
            })),
          }));
          state.groups = Array.isArray(data.groups) ? data.groups.map((g) => ({
            id: g.id || uid(),
            name: g.name || "Group",
            color: g.color || nextGroupColor(),
            parentId: g.parentId ?? null,
          })) : [];
          // drop dangling groupId/parentId references to groups that weren't included in the import
          const validGroupIds = new Set(state.groups.map((g) => g.id));
          state.subjects.forEach((s) => { if (s.groupId && !validGroupIds.has(s.groupId)) s.groupId = null; });
          state.groups.forEach((g) => { if (g.parentId && !validGroupIds.has(g.parentId)) g.parentId = null; });
          if (data.scale && SCALES[data.scale]) state.scale = data.scale;
          state.visibleIds = new Set(state.subjects.map((s) => s.id));
          persist();
          render();
          showToast(`${icon("check", 14)} ${escapeHtml(t('ui.importSuccess'))}`);
        },
      });
    } catch (err) {
      showToast(`${icon("alert", 14)} ${escapeHtml(t('ui.importFail'))}`);
    }
  };
  reader.readAsText(file);
}

  const newHtml = !filtered.length
    ? `<div class="home-empty">${escapeHtml(all.length ? t('ui.noMatchingTests') : t('ui.noTestsYet'))}</div>`
    : `<div class="home-test-list">${filtered.map((e) => {
        const days = e.upcoming ? daysUntil(e.date) : null;
        let countdown = "";
        if (e.upcoming) {
          if (days < 0) countdown = t('ui.overdue');
          else if (days === 0) countdown = t('ui.today');

  // also refresh the clear-filters button visibility and search-clear button without a full render

    document.getElementById("homeFilterClearAll").addEventListener("click", () => {
      state.testFilters = { search: "", tag: null, subjectId: null, smiley: null, dateFrom: "", dateTo: "" };
      render();
    });
  } else if (!anyFilterActive && clearBtn) {
    clearBtn.remove();
  }
  const searchBar = root.querySelector(".test-search-bar");
  let searchClearBtn = document.getElementById("homeSearchClear");
  if (f.search && !searchClearBtn && searchBar) {
    searchBar.insertAdjacentHTML("beforeend", `<button type="button" class="test-search-clear" id="homeSearchClear">${icon("x", 14)}</button>`);
    document.getElementById("homeSearchClear").addEventListener("click", () => {
      state.testFilters.search = "";

  const homeFilterTag = document.getElementById("homeFilterTag");
